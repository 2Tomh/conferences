<div class="user-management-container">
    <div class="header-section">
        <h2>{{ 'USER_MGMT.TITLE' | translate }}</h2>
        <button class="btn-primary" [routerLink]="['/admin/create-user']">
            + {{ 'USER_MGMT.ADD_USER' | translate }}
        </button>
    </div>
    <div class="table-wrapper" *ngIf="!editingUser">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>E-mail</th>
                    <th>Role</th>
                    <th>Faculty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td>{{ user.FullName }}</td>
                    <td>{{ user.Email }}</td>
                    <td>
                        <span class="badge" [ngClass]="user.Role">{{ 'ROLES.' + user.Role.toUpperCase() | translate }}</span>
                    </td>
                    <td>{{ user.FacultyName || '—' }}</td>
                    <td class="actions">
                        <button class="btn-edit" (click)="startEdit(user)">Edit</button>
                        <button class="btn-delete" (click)="deleteUser(user.Id)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="edit-card" *ngIf="editingUser">
        <div class="edit-header">
            
            <h3>{{ 'USER_MGMT.EDIT.TITLE' | translate: {name: editingUser.FullName} }}</h3>
        </div>
        <form [formGroup]="editForm" (ngSubmit)="saveEdit()">
            <div>
                <label>Name</label>
                <input formControlName="fullName" type="text">
            </div>
            
            <div>
                <label>E-mail</label>
                <input formControlName="email" type="email">
            </div>
            
            <div>
                <label>Role</label>
                <select formControlName="role">
                    <option *ngFor="let role of roles" [value]="role">'{{ 'ROLES.' + role.toUpperCase() | translate }}'</option>
                </select>
            </div>
            <div>
                <label>Faculty</label>
                <select formControlName="facultyName">
                    <option value="">-- Select Faculty --</option>
                    <option *ngFor="let f of faculties" [value]="f">{{ f }}</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-save">Update</button>
                <button type="button" class="btn-cancel" (click)="cancelEdit()">Cancel</button>
            </div>
        </form>
    </div>
</div>
