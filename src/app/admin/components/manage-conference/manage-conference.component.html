<div class="manage-container" dir="rtl">
  <div class="form-card">

    <div class="step-indicator">
      <div class="step-dot" [class.active]="currentStep === 1" [class.done]="currentStep > 1">1</div>
      <div class="step-connector" [class.filled]="currentStep > 1"></div>
      <div class="step-dot" [class.active]="currentStep === 2" [class.done]="currentStep > 2">2</div>
      <div class="step-connector" [class.filled]="currentStep > 2"></div>
      <div class="step-dot" [class.active]="currentStep === 3" [class.done]="currentStep > 3">3</div>
    </div>

    <form [formGroup]="conferenceForm" (ngSubmit)="onSubmit()">

      <div *ngIf="currentStep === 1" class="step-content">
        <h3>{{ (isEditMode ? 'MANAGE.EDIT_TITLE' : 'MANAGE.CREATE_TITLE') | translate }}</h3>

        <div class="form-group">
          <label>שם הכנס (באנגלית):</label>
          <input type="text" formControlName="Conference" class="form-control" placeholder="הזן שם כנס באנגלית">
        </div>

        <div class="form-group">
          <label>קטגוריה:</label>
          <select formControlName="Category" class="form-control">
            <option value="" disabled selected>-- בחר קטגוריה מתוך הרשימה --</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>תיאור הכנס:</label>
          <textarea formControlName="Description" class="form-control" rows="6"
            placeholder="תאר את הכנס בקצרה..."></textarea>
        </div>

        <div class="form-group checkbox-wrapper">
          <label>
            <input type="checkbox" formControlName="Abstract_submission">
            <span>מאפשר הגשת תקצירים (Abstract Submission)</span>
          </label>
        </div>

        <div *ngIf="conferenceForm.get('Abstract_submission')?.value" class="sub-section">
          <label>⚙️ הגדרות הנחיות למגישים</label>
          <div class="form-group">
            <label>הנחיות להגשת תקציר (יוצג למשתמש):</label>
            <textarea formControlName="AbstractGuidelines" class="form-control" rows="3"
              placeholder="כתוב כאן הנחיות הגשה..."></textarea>
          </div>
        </div>
      </div>

      <div *ngIf="currentStep === 2" class="step-content">
        <h3>קישורים ומדיה</h3>

        <div formGroupName="Links" class="sub-section">
          <label>🔗 קישורים ומדיה</label>

          <div class="form-group">
            <label>לינק לסקר (Google Forms):</label>
            <input type="text" formControlName="survey" class="form-control"
              placeholder="https://docs.google.com/forms/...">
          </div>

          <div class="form-group">
            <label>אתר אינטרנט של הכנס:</label>
            <input type="text" formControlName="website" class="form-control" placeholder="https://...">
          </div>
        </div>
      </div>

      <div *ngIf="currentStep === 3" class="step-content">
        <h3>👥 מארגנים ואנשי סגל</h3>

        <div formArrayName="Organizers" class="sub-section">
          <label>מארגנים</label>

          <div *ngFor="let org of organizersFormArray.controls; let i = index" class="row">
            <input type="text" [formControlName]="i" class="form-control" placeholder="שם המארגן ומוסד אקדמי">
            <button type="button" (click)="removeOrganizer(i)" title="הסר מארגן">❌</button>
          </div>

          <button type="button" (click)="addOrganizer()">➕ הוסף מארגן חדש</button>
        </div>
      </div>

      <div class="actions">
        <button type="button" *ngIf="currentStep > 1" (click)="prevStep()">➡️ קודם</button>
        <button type="button" *ngIf="currentStep === 1" routerLink="/admin/dashboard">ביטול</button>
        <button type="button" class="btn-save" *ngIf="currentStep < 3" (click)="nextStep()">המשך ⬅️</button>
        <button type="submit" class="btn-save" *ngIf="currentStep === 3">
          {{ isEditMode ? 'עדכן כנס סופית' : 'צור כנס חדש' }}
        </button>
      </div>

    </form>
  </div>
</div>
