<div class="login-wrapper">
  <div class="login-card shadow">
    <h2 class="text-center uni-title">כניסה למערכת הכנסים</h2>

    <div *ngIf="errorMessage" class="error-msg text-center mb-3">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <div class="field mb-3">
        <label for="email">אימייל</label>
        <input type="email" id="email" formControlName="email" class="custom-input" placeholder="example@univ.ac.il">
      </div>

      <div class="field mb-4">
        <label for="password">סיסמה</label>
        <input type="password" id="password" formControlName="password" class="custom-input" placeholder="******">
      </div>

      <button type="submit" [disabled]="loginForm.invalid">התחבר</button>
    </form>
  </div>
</div>
