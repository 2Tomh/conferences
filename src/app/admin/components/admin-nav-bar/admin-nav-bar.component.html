<nav class="top-navbar">
  <div class="nav-container">
    <div class="nav-links" [dir]="currentDir">

      <!-- כפתור השפה נשאר תמיד בקצה הקבוע (התחלת הכיוון), בין אם מחוברים ובין אם לא -->
      <app-header-actions class="lang-switch"></app-header-actions>

      <!-- קישורי המערכת מוצגים רק אחרי התחברות -->
      <ng-container *ngIf="isLoggedIn$ | async">

        <a routerLink="/admin/dashboard" routerLinkActive="active">
          <i class="icon-dashboard"></i> {{ 'Admin_NAV.DASHBOARD' | translate }}
        </a>

        <ng-container *ngIf="authService.isAnyManager()">
          <a routerLink="/admin/attendees" routerLinkActive="active">
            נרשמים
          </a>
        </ng-container>

        <ng-container *ngIf="authService.isAdmin()">
          <a routerLink="/admin/users" routerLinkActive="active">
            <i class="icon-users"></i> {{ 'Admin_NAV.USERS' | translate }}
          </a>
        </ng-container>

        <ng-container *ngIf="authService.isAdmin()">
          <a routerLink="/admin/manage-conference" routerLinkActive="active">
            <i class="icon-calendar"></i> ניהול כנסים
          </a>
          <a routerLink="/admin/edit-conference" routerLinkActive="active" class="edit-nav-btn">
            <i class="icon-edit"></i> עריכת כנס
          </a>
        </ng-container>

        <div class="nav-actions" *ngIf="!isLoginPage">
          <button class="btn-logout" (click)="onLogout()">
            <span>{{ 'Admin_NAV.LOGOUT' | translate }}</span>
            <i class="icon-exit">LogOut</i>
          </button>
        </div>

      </ng-container>

    </div>
  </div>
</nav>
