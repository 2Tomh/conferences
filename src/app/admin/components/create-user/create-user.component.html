<div class="create-user-container">
  <h2>{{ 'CREATE_USER.TITLE' | translate }}</h2>
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>{{ 'CREATE_USER.FULL_NAME' | translate }}</label>
      <input formControlName="fullName" [placeholder]="'CREATE_USER.FULL_NAME' | translate">
    </div>

    <div class="form-group">
      <label>{{ 'CREATE_USER.EMAIL' | translate }}</label>
      <input formControlName="email" [placeholder]="'CREATE_USER.EMAIL' | translate">
    </div>

    <div class="form-group">
      <label>{{ 'CREATE_USER.PASSWORD' | translate }}</label>
      <input type="password" formControlName="password" [placeholder]="'CREATE_USER.PASSWORD' | translate">
    </div>

    <div class="form-group">
      <label>{{ 'CREATE_USER.ROLE' | translate }}</label>
      <select formControlName="role">
        <option value="Admin">{{ 'ROLES.ADMIN' | translate }}</option>
        <option value="FacultyManager">{{ 'ROLES.FACULTY_MANAGER' | translate }}</option>
        <option value="Lecturer">{{ 'ROLES.LECTURER' | translate }}</option>
      </select>
    </div>

    <button type="submit" [disabled]="userForm.invalid">
      {{ 'CREATE_USER.SUBMIT' | translate }}
    </button>
  </form>
</div>
