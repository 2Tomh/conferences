<div class="create-user-container">
  <h2>יצירת משתמש חדש</h2>
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    
    <input formControlName="fullName" placeholder="שם מלא">
    <input formControlName="email" placeholder="אימייל">
    <input type="password" formControlName="password" placeholder="סיסמה">
  
    <select formControlName="role">
      <option value="Admin">Admin</option>
      <option value="FacultyManager">FacultyManager</option>
    </select>

    <select *ngIf="userForm.value.role === 'FacultyManager'" formControlName="departmentName">
      <option value="" disabled selected>-- בחר מחלקה --</option>
      <option *ngFor="let dept of departments" [value]="dept">{{ dept }}</option>
    </select>

    <select formControlName="conferenceId">
      <option value="" disabled selected>-- בחר כנס לשיוך --</option>
      <option *ngFor="let conf of filteredConferences" [value]="conf.Id">
        {{ conf.Name || conf.name }}
      </option>
    </select>

    <button type="submit" [disabled]="userForm.invalid">יצירת משתמש</button>
  </form>
</div>
