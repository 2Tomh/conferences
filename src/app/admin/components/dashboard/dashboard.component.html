<div class="dashboard-container">
  <div class="header-actions">
    <h1>ניהול הכנסים שלי</h1>
    <button class="btn-add" routerLink="../manage-conference">➕ יצירת כנס חדש</button>
  </div>

  <div *ngIf="loading" class="loader">טוען נתונים...</div>

  <table *ngIf="!loading && conferences.length > 0" class="admin-table">
    <thead>
      <tr>
        <th>שם הכנס</th>
        <th>תאריך</th>
        <th>מיקום</th>
        <th>נרשמים</th>
        <th>פעולות</th>
      </tr>
    </thead>
    <tbody>
      <!-- <tr *ngFor="let conf of conferences">
         <td>{{ conf.Name }}</td>
        <td>{{ conf.date | date:'dd/MM/yyyy' }}</td>
        <td>{{ conf.location }}</td>
        <td>{{ conf.attendeesCount }}</td>
        <td>
          <button class="btn-edit" [routerLink]="['../manage-conference', conf.id]">ערוך</button>
          <button class="btn-delete" (click)="onDelete(conf.id)">מחק</button>
        </td>
      </tr> -->
      <tr *ngFor="let conf of conferences">
        <td>{{ conf.name }}</td>
        <td>{{ conf.date | date:'dd/MM/yyyy' }}</td>
        <td>{{ conf.location }}</td>
        <td>{{ conf.sessions?.length || 0 }}</td>
        <td>
          <button class="btn-edit" [routerLink]="['../manage-conference', conf.id]">ערוך</button>
          <button class="btn-delete" (click)="onDelete(conf.id)">מחק</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && conferences.length === 0" class="no-data">
    טרם יצרת כנסים. לחץ על "יצירת כנס חדש" כדי להתחיל.
  </div>
</div>
