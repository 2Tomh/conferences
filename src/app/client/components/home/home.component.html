<!-- כוכבים ברקע -->

<header class="home-header text-center">
    <div class="bg-decoration">
        <svg class="star star-1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 0 L55 45 L100 50 L55 55 L50 100 L45 55 L0 50 L45 45 Z" fill="#7dd8f0" />
        </svg>
        <svg class="star star-2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 0 L55 45 L100 50 L55 55 L50 100 L45 55 L0 50 L45 45 Z" fill="#7dd8f0" />
        </svg>

        <!--  -->
        <svg class="network" viewBox="0 0 240 520" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgb(106, 164, 255)" />
                    <stop offset="100%" stop-color="#3dd4f0" />
                </linearGradient>
            </defs>

            <!-- קשת שמאל חיצונית מפוצלת -->
            <path d="M70 30 Q30 90 15 160" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M15 160 Q-5 225 10 290" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M10 290 Q20 360 35 400" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M35 400 Q70 450 110 490" stroke="url(#lineGrad)" stroke-width="8" fill="none" />

            <!-- קשת ימין חיצונית מפוצלת -->
            <path d="M70 30 Q150 70 190 165" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M190 165 Q215 225 210 290" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M210 290 Q210 350 185 400" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <path d="M185 400 Q150 450 110 490" stroke="url(#lineGrad)" stroke-width="8" fill="none" />
            <!-- חיבורים אופקיים -->
            <path d="M15 160 Q100 130 190 165" stroke="url(#lineGrad)" stroke-width="5" fill="none" />
            <path d="M10 290 Q100 260 205 290" stroke="url(#lineGrad)" stroke-width="5" fill="none" />
            <path d="M35 400 Q110 375 185 400" stroke="url(#lineGrad)" stroke-width="6" fill="none" />
            <!-- חיבורים אלכסוניים -->
            <path d="M15 160 Q12 225 10 290" stroke="url(#lineGrad)" stroke-width="6" fill="none" />
            <path d="M10 290 Q22 345 35 400" stroke="url(#lineGrad)" stroke-width="6" fill="none" />
            <!-- חיבורים פנימיים אלכסוניים -->
            <path d="M15 160 Q80 200 100 260" stroke="url(#lineGrad)" stroke-width="6" fill="none" />
            <path d="M190 165 Q130 200 100 260" stroke="url(#lineGrad)" stroke-width="5" fill="none" />
            <path d="M100 260 Q65 330 35 400" stroke="url(#lineGrad)" stroke-width="6" fill="none" />
            <path d="M100 260 Q145 330 185 400" stroke="url(#lineGrad)" stroke-width="5" fill="none" />

            <!-- כדורים — כהה למעלה, בהיר למטה -->
            <circle cx="70" cy="30" r="20" fill="#3d5a9a" />
            <circle cx="15" cy="160" r="14" fill="#4472b0" />
            <circle cx="190" cy="165" r="17" fill="#4a8fc5" />
            <circle cx="10" cy="290" r="14" fill="#4aaad8" />
            <circle cx="100" cy="260" r="20" fill="#3ab8e0" />
            <circle cx="205" cy="290" r="20" fill="#4aaad8" />
            <circle cx="35" cy="400" r="14" fill="#3dcfef" />
            <circle cx="185" cy="400" r="14" fill="#3dcfef" />
            <circle cx="110" cy="490" r="17" fill="#3ddaf5" />
        </svg>
    </div>
    <div class="container">
        <div class="logo-wrapper">
            <img src="../../../assets/logo.jpeg" alt="Logo" class="home-logo">
        </div>
        <div class="about-confrence">
            <app-about-conference class="flex-item"></app-about-conference>
        </div>
    </div>
</header>
