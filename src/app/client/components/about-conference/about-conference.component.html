
<section class="about-section">
    <div class="container">
        <div class="about-card">
            <div class="accent-line"></div>
            <p class="about-lead">
                {{ 'ABOUT.LEAD' | translate }}
            </p>
            <div class="about-content">
                <p [innerHTML]="'ABOUT.CONTENT_1' | translate"></p>
                <p>{{ 'ABOUT.CONTENT_2' | translate }}</p>
                <p>{{ 'ABOUT.CONTENT_3' | translate }}</p>
            </div>
            
            <div class="about-actions" style="margin-top: 30px; text-align: center;">
                <button routerLink="/ConferenceEvents" class="survey-btn">
                    {{ 'ABOUT.GO_TO_EVENTS' | translate }}
                </button>
            </div>
        </div>
    </div>
</section>
