<div class="registration-page">
  <div class="registration-card">
    
    <div class="card-header-custom">
      <h2>הרשמה לכנס</h2>
      <p>הזינו את הפרטים להמשך הרשמה מאובטחת</p>
    </div>

    <form [formGroup]="regForm" (ngSubmit)="onSubmit()" class="registration-form">

      <div class="form-row">
        <label>מחלקה</label>
        <select formControlName="department" class="form-select" (change)="onDepartmentChange()">
          <option value="">בחר מחלקה</option>
          <option *ngFor="let dept of departments" [value]="dept">{{dept}}</option>
        </select>
      </div>

      <div class="form-row">
        <label>כנס</label>
        <select formControlName="conferenceId" class="form-select" (change)="onConferenceChange()">
          <option value="">בחר כנס</option>
          <option *ngFor="let conf of filteredConferences" [value]="conf.id || conf._id">
            {{conf.name}}
          </option>
        </select>
      </div>

      <div class="form-row">
        <label>שם מלא</label>
        <input type="text" formControlName="fullName" class="form-control" placeholder="ישראל ישראלי">
      </div>

      <div class="form-row">
        <label>כתובת אימייל</label>
        <input type="email" formControlName="email" class="form-control" placeholder="name@example.com">
        <div *ngIf="regForm.get('email')?.invalid && regForm.get('email')?.touched" class="error-text">
          אימייל לא תקין
        </div>
      </div>

      <div class="form-row">
        <label>טלפון</label>
        <input type="text" formControlName="phone" class="form-control" placeholder="050-0000000">
      </div>

      <div class="form-row">
        <label>מוסד / ארגון</label>
        <input type="text" formControlName="institution" class="form-control">
      </div>

      <button type="submit" [disabled]="regForm.invalid" class="btn-submit">
        המשך לתשלום
      </button>

    </form>
  </div>
</div>
