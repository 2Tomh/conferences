<div class="list-page" dir="rtl">

  <div class="page-header">
    <h1>כל הכנסים</h1>
    <p>גלה את הכנסים הקרובים והירשם לאלה שמעניינים אותך</p>
  </div>

  <div *ngIf="loading" class="loader-wrapper">
    <div class="spinner"></div>
    <p>טוען כנסים...</p>
  </div>

  <div *ngIf="!loading" class="content-wrapper">

    <div class="faculty-section" *ngFor="let group of facultyGroups">

      <!-- כותרת פקולטה -->
      <div class="faculty-header">
        <h2>{{ group.name }}</h2>
        <span class="count-badge">{{ group.conferences.length }} כנסים</span>
      </div>

      <!-- שורה אופקית -->
      <div class="scroll-row">
        <div class="conference-card" *ngFor="let conf of group.conferences" (click)="goToConference(conf.id)">
          <div class="card-inner">
            <div class="card-icon">🎓</div>
            <h3>{{ conf.name }}</h3>
            <p class="description">{{ conf.description }}</p>
            <div class="card-meta">
              <span>📅 {{ formatDate(conf.date) }}</span>
              <span>📍 {{ conf.location }}</span>
              <span>👥 {{ conf.maxParticipants }}</span>
            </div>
            <div class="btn-details">לפרטים ←</div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
