<div class="payment-container">
    <div *ngIf="loading" class="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <span class="ms-2">טוען דף תשלום מאובטח...</span>
    </div>
    <div *ngIf="error" class="error-message">
        <p>{{ error }}</p>
        <button (click)="initPayment()">נסה שוב</button>
    </div>

    <iframe class="iframe-payment" *ngIf="iframeUrl && !loading" [src]="iframeUrl" width="100%" height="600px"
        frameborder="0">
    </iframe>
</div>
