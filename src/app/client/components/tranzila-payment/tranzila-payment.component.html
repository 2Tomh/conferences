<div class="payment-container">
    <div *ngIf="loading" class="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <span class="ms-2">טוען דף תשלום מאובטח...</span>
    </div>

    <div *ngIf="error" class="error-message">
        <p>{{ error }}</p>
        <button type="button" (click)="ngOnInit()">נסה שוב</button>
    </div>

    <!-- טופס מעבר ישיר לטרנזילה במסך מלא (ללא iframe וללא target) -->
    <form #paymentForm ngNoForm action="https://direct.tranzila.com/kapaim3/iframenew.php" method="POST" style="display: none;">
        <input type="hidden" name="sum" [value]="paymentData.amount">
        <input type="hidden" name="orderId" [value]="paymentData.orderId">
        <input type="hidden" name="currency" value="1">
        <input type="hidden" name="notify_url_address" value="https://conference-backend-8339.onrender.com/api/payment/notify">

        <!-- כתובות ההצלחה והכישלון -->
        <input type="hidden" name="success_url_address" [value]="paymentData.successUrl">
        <input type="hidden" name="fail_url_address" [value]="paymentData.failureUrl">
        
        <!-- חובה: מורה לטרנזילה לחזור בשיטת GET כדי למנוע שגיאת 405 -->
        <input type="hidden" name="success_method" value="1">

        <input type="hidden" name="email" [value]="paymentData.email">
        <input type="hidden" name="contact" [value]="paymentData.fullName">
        <input type="hidden" name="company" [value]="paymentData.affiliation">
        <input type="hidden" name="eventname" value="MIND-IL">
        <input type="hidden" name="pdesc" value="MIND-IL CONFERENCE REGISTRATION">
    </form>
</div>

<!-- פופ-אפ רישום כפול -->
<div *ngIf="alreadyRegistered" class="popup-overlay">
    <div class="popup-content">
        <h3>Already Registered</h3>
        <p>You are already a registered participant of this conference.</p>
        <button type="button" class="btn-submit" (click)="closeAlreadyRegisteredPopup()">
            OK
        </button>
    </div>
</div>
