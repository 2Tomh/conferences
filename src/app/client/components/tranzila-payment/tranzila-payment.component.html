<div class="payment-container">
  <div *ngIf="loading" class="payment-loading">
    <p>Preparing your secure payment...</p>
  </div>

  <div *ngIf="error" class="payment-error">
    <p>{{ error }}</p>
  </div>

  <form #paymentForm *ngIf="!loading && !error && !alreadyRegistered"
        [action]="'https://direct.tranzila.com/' + paymentData.terminal + '/iframenew.php'"
        method="POST" target="_self">
    <input type="hidden" name="sum" [value]="paymentData.amount">
    <input type="hidden" name="currency" value="1">
    <input type="hidden" name="myid" [value]="paymentData.orderId">
    <input type="hidden" name="contact" [value]="paymentData.fullName">
    <input type="hidden" name="email" [value]="paymentData.email">
    <input type="hidden" name="success_url_address" [value]="paymentData.successUrl">
    <input type="hidden" name="fail_url_address" [value]="paymentData.failureUrl">
    <input type="hidden" name="notify_url_address" [value]="paymentData.notifyUrl">
  </form>
</div>

<!-- Already Registered popup -->
<div *ngIf="alreadyRegistered" class="popup-overlay">
  <div class="popup-content">
    <h3>Already Registered</h3>
    <p>You are already a registered participant of this conference.</p>
    <button type="button" class="btn-submit" (click)="closeAlreadyRegisteredPopup()">
      OK
    </button>
  </div>
</div>
