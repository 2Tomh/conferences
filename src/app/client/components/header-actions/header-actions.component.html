<div class="language-container">
  <button (click)="onToggleLanguage()" [attr.aria-label]="'COMMON.TOGGLE_LANG' | translate" class="lang-toggle-btn">
    <span class="lang-option" [class.active]="currentLang === 'en'">EN</span>
    <span class="lang-divider">|</span>
    <span class="lang-option" [class.active]="currentLang === 'he'">עב</span>
  </button>
</div>
