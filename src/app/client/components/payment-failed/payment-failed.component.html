<div class="result-container failed-mode">
  <div class="result-card">
    <div class="icon-circle">
      <span class="cross">&#10005;</span>
    </div>
    
    <h2>{{ 'PAYMENT_RESULT.FAILED_TITLE' | translate }}</h2>
    <p class="sub-message">{{ 'PAYMENT_RESULT.NOT_CHARGED' | translate }}</p>

    <div class="action-wrapper" style="display: flex; gap: 15px; justify-content: center;">
      <a routerLink="/ConferenceEvents" class="survey-btn secondary-style">
        {{ 'PAYMENT_RESULT.RETRY' | translate }}
      </a>
      <a routerLink="/" class="survey-btn">
        {{ 'PAYMENT_RESULT.BACK_HOME' | translate }}
      </a>
    </div>
  </div>
</div>
